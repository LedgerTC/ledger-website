<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Ledger Trade & Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-dark: #1C3134;
    --teal-mid: #3D5C5E;
    --gold: #D9A842;
    --cream: #DDD5C5;
    --off-white: #F2F0EB;
    --black: #111111;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--teal-dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .overlay {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 420px;
    width: 100%;
    border: 1px solid rgba(217,168,66,0.3);
    border-radius: 16px;
    padding: 48px;
    background: rgba(28,49,52,0.95);
    text-align: center;
  }

  .logo { margin-bottom: 32px; }
  .logo svg { height: 44px; width: auto; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--cream);
    margin-bottom: 32px;
    opacity: 0.8;
  }

  .form-group { margin-bottom: 16px; text-align: left; }

  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(217,168,66,0.2);
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="password"]::placeholder { color: rgba(221,213,197,0.4); }
  input[type="password"]:focus { border-color: var(--gold); }

  .btn {
    width: 100%;
    padding: 14px 24px;
    background: var(--gold);
    color: var(--teal-dark);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }

  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    font-size: 13px;
    color: #e8694a;
    margin-top: 10px;
    min-height: 18px;
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  /* No files screen */
  .no-files {
    text-align: center;
  }

  .no-files h1 {
    color: #fff;
    font-size: 26px;
    margin-bottom: 12px;
  }

  .no-files .subtitle {
    margin-bottom: 0;
  }

  /* Document iframe */
  .doc-frame {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
    background: var(--off-white);
  }

  .hidden { display: none; }
</style>
</head>

    <h1>Client Portal</h1>
    <p class="subtitle">Enter your access code to continue.</p>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <input type="password" id="passwordInput" placeholder="Access code" autocomplete="off" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Continue &rarr;</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
</div>

<!-- Document Frame -->
<iframe id="docFrame" class="doc-frame hidden"></iframe>

<script>
(function() {
  var path = window.location.pathname.replace(/\/+$/, '');
  var parts = path.split('/').filter(Boolean);
  // Expected: ['externaldocshare', orgId, docId]
  var orgId = parts[1] || '';
  var docId = parts[2] || '';

  var noFiles = document.getElementById('noFiles');
  var loginOverlay = document.getElementById('loginOverlay');
  var docFrame = document.getElementById('docFrame');
  var loginForm = document.getElementById('loginForm');
  var passwordInput = document.getElementById('passwordInput');
  var submitBtn = document.getElementById('submitBtn');
  var errorMsg = document.getElementById('errorMsg');

  if (!orgId || !docId) {
    noFiles.classList.remove('hidden');
    return;
  }

  var sessionKey = 'auth-' + orgId + '-' + docId;

  var docCacheKey = 'doc-' + orgId + '-' + docId;

  if (sessionStorage.getItem(sessionKey) === '1') {
    var cached = sessionStorage.getItem(docCacheKey);
    if (cached) {
      showDocument(cached);
    } else {
      sessionStorage.removeItem(sessionKey);
      loginOverlay.classList.remove('hidden');
    }
    return;
  }

  loginOverlay.classList.remove('hidden');

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    var password = passwordInput.value;
    if (!password) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Verifying...';
    errorMsg.textContent = '';

    fetch('/.netlify/functions/get-document', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orgId: orgId, docId: docId, password: password })
    })
    .then(function(res) {
      if (res.ok) return res.text();
      throw new Error(res.status);
    })
    .then(function(html) {
      sessionStorage.setItem(sessionKey, '1');
      try { sessionStorage.setItem(docCacheKey, html); } catch(e) {}
      showDocument(html);
    })
    .catch(function() {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Continue &rarr;';
      errorMsg.textContent = 'Incorrect access code. Please try again.';
      passwordInput.classList.remove('shake');
      void passwordInput.offsetWidth;
      passwordInput.classList.add('shake');
    });
  });

  function showDocument(html) {
    loginOverlay.classList.add('hidden');
    docFrame.classList.remove('hidden');
    docFrame.srcdoc = html;
  }
})();
</script>
